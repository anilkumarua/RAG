name: CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java for Spark
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app.py ecopulse scripts

      - name: Run unit tests
        run: python -m pytest tests -q -p no:cacheprovider

      - name: Smoke test ingestion pipeline
        run: python scripts/run_ingestion.py --city Delhi --bootstrap-kb

      - name: Verify Streamlit entry point imports
        run: python -c "import app; print('app import ok')"
